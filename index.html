<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دانلود مود Verity BE (بدراک)</title>
    <style>
        /* ---- تنظیمات کلی و انیمیشن‌ها ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
            /* پس‌زمینه آبی-بنفش برای تفاوت با نسخه جاوا */
            background: linear-gradient(145deg, #7c8cff 0%, #5a4fcf 50%, #3b2f9e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            direction: rtl;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            padding: 40px 30px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeInUp 0.9s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3), 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 5px;
            letter-spacing: 1px;
            animation: glowPulseBlue 3s infinite alternate;
        }

        @keyframes glowPulseBlue {
            0% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.2), 0 4px 8px rgba(0,0,0,0.2); }
            100% { text-shadow: 0 0 60px rgba(255, 255, 255, 0.6), 0 4px 8px rgba(0,0,0,0.2); }
        }

        .subtitle {
            color: #d9deff;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.2);
            padding-bottom: 12px;
        }

        .mod-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 18px 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .mod-info p {
            color: #eef2ff;
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 2;
        }

        .mod-info span {
            background: #2a1f7a;
            color: #d9deff;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        /* ===== گالری تصاویر ===== */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0 30px;
        }

        .gallery img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 18px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 12px 24px rgba(0,0,0,0.4);
            border-color: #aab4ff;
        }

        /* ===== دکمه دانلود ===== */
        .download-btn {
            display: inline-block;
            background: linear-gradient(145deg, #aab4ff, #6c7cdb);
            color: #0b0e1a;
            font-weight: 900;
            font-size: 1.35rem;
            padding: 18px 40px;
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -6px rgba(108, 124, 219, 0.5);
            border: none;
            cursor: pointer;
            width: 100%;
            animation: float 3.5s ease-in-out infinite;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .download-btn:hover {
            background: linear-gradient(145deg, #c2caff, #6c7cdb);
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 18px 35px -6px rgba(108, 124, 219, 0.7);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        /* ===== لوگوی مستطیلی پایین با لینک جدید ===== */
        .logo-section {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-rect {
            width: 200px;
            height: 80px;
            border-radius: 20px;
            border: 4px solid #d9deff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background: #ffffff;
        }

        .logo-rect:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
        }

        .logo-rect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .footer-note {
            margin-top: 15px;
            color: #d9deff;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.8;
        }

        @media (max-width: 550px) {
            .card { padding: 25px 18px; }
            .title { font-size: 2.2rem; }
            .gallery img { width: 110px; height: 110px; }
            .download-btn { font-size: 1.1rem; padding: 14px 20px; }
            .logo-rect { width: 150px; height: 65px; }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- عنوان -->
        <h1 class="title">💎 Verity BE</h1>
        <p class="subtitle">دستیار هوشمند برای ماین‌کرفت بدراک</p>

        <!-- اطلاعات مود -->
        <div class="mod-info">
            <p>
                📦 نسخه مخصوص <span>بدراک ادیشن</span> <br>
                🛡️ کاملاً ایمن و بدون ویروس
            </p>
        </div>

        <!-- ===== گالری تصاویر با هر دو لینک ===== -->
        <div class="gallery">
            <!-- اسکرین‌شات اول -->
            <img src="https://media.forgecdn.net/attachments/1740/151/screenshot-2026-06-17-130303-png.png" alt="اسکرین‌شات وریتی بدراک ۱">
            <!-- اسکرین‌شات دوم (لینک خودتان) -->
            <img src="https://github.com/Hereland2345/random/blob/main/random_ss.png?raw=true" alt="اسکرین‌شات وریتی بدراک ۲">
        </div>

        <!-- دکمه دانلود -->
        <a href="https://www.curseforge.com/api/v1/mods/1575941/files/8252948/download" 
           target="_blank" 
           class="download-btn">
            ⬇️ دانلود مستقیم Verity BE
        </a>

        <!-- ===== لوگوی مستطیلی پایین با لینک جدید ===== -->
        <div class="logo-section">
            <div class="logo-rect">
                <img src="https://raw.githubusercontent.com/Hereland2345/random/refs/heads/main/Photos23.png" alt="لوگوی وریتی بدراک">
            </div>
        </div>
        <div class="footer-note">
            🔒 دانلود از منبع رسمی CurseForge
        </div>

    </div>

</body>
</html>
